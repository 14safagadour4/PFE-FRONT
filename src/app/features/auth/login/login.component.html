<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Connexion</h2>

        <div *ngIf="errorMsg()" class="error-message">
            {{ errorMsg() }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" placeholder="[EMAIL_ADDRESS]" required>
                <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error">
                    Email invalide
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input id="password" type="password" formControlName="password" placeholder="••••••••" required>
                <div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="error">
                    Mot de passe requis
                </div>
            </div>

            <button type="submit" [disabled]="loading() || form.invalid" class="btn-primary">
                {{ loading() ? 'Connexion...' : 'Se connecter' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Pas encore de compte ? <a routerLink="/register">Inscrivez-vous</a></p>
            <p>Mot de passe oublié ? <a href="#">Demander une réinitialisation</a></p>
        </div>
    </div>
</div>
